# Nginx: produção — APENAS arquivos estáticos da pasta dist/.
#
# Se `curl -s https://SEU_DOMINIO/ | head -5` mostrar /@vite/client ou /src/main.jsx,
# o servidor ainda está com proxy para `npm run dev` ou root na raiz do repo — isso
# causa tela branca (HMR/WebSocket ou falha ao carregar módulos). Corrija antes de
# qualquer outro debug.
#
# Verificação: bash deploy/verificar-html-producao.sh https://SEU_DOMINIO
#
# Copie para a VPS: sudo cp /root/planeje/deploy/nginx-planeje-proxy.conf /etc/nginx/sites-available/planeje
# O Nginx roda como www-data e não lê /root — publique o build em /var/www/planeje:
#   sudo rsync -a --delete /root/planeje/dist/ /var/www/planeje/
#   sudo chown -R www-data:www-data /var/www/planeje
# Ative: sudo ln -sf /etc/nginx/sites-available/planeje /etc/nginx/sites-enabled/
# SSL: sudo certbot --nginx -d planeje.jbapex.com.br
# Recarregue: sudo nginx -t && sudo systemctl reload nginx
#
# Build: npm run build (saída em dist/). Desenvolvimento local: npm run dev na 3003
# sem passar pelo Nginx deste arquivo.

server {
  listen 80;
  server_name planeje.jbapex.com.br;
  return 301 https://$server_name$request_uri;
}

server {
  listen 443 ssl;
  server_name planeje.jbapex.com.br;

  ssl_certificate /etc/letsencrypt/live/planeje.jbapex.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/planeje.jbapex.com.br/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  access_log /var/log/nginx/planeje-access.log;
  error_log /var/log/nginx/planeje-error.log;

  root /var/www/planeje;
  index index.html;

  # HTML sempre fresco — sem isso, o browser pode manter index antigo e nunca buscar o JS novo (hash muda a cada build).
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires -1;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;
}
