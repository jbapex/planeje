# Reverse proxy: MCP Planeje (Streamable HTTP em /mcp + /health na 3100).
# Instalação na VPS:
#   sudo cp deploy/nginx-mcp.planeje.jbapex.com.br.conf /etc/nginx/sites-available/mcp.planeje.jbapex.com.br
#   sudo ln -sf /etc/nginx/sites-available/mcp.planeje.jbapex.com.br /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# SSL:
#   sudo certbot --nginx -d mcp.planeje.jbapex.com.br
#
# DNS: mcp.planeje.jbapex.com.br → IP desta VPS.

server {
    listen 80;
    listen [::]:80;
    server_name mcp.planeje.jbapex.com.br;

    access_log /var/log/nginx/mcp-planeje-access.log;
    error_log  /var/log/nginx/mcp-planeje-error.log;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Streamable MCP / SSE: evita bufferização que quebra eventos
        proxy_buffering off;
        proxy_cache off;
        gzip off;

        proxy_connect_timeout 60s;
        proxy_send_timeout    3600s;
        proxy_read_timeout    3600s;
    }
}
